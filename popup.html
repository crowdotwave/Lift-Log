<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Lift Log</title>
<style>
  :root {
    --bg: #07101f;
    --card: rgba(255, 255, 255, 0.04);
    --card-border: rgba(120, 180, 255, 0.12);
    --text: #e7f0ff;
    --muted: #8ea0bc;
    --accent: #3b82f6;
    --good: #10d9a3;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 340px;
    min-height: 600px;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
  }
  .wrap { position: relative; z-index: 1; padding: 12px 16px; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 18px;
  }
  .logo { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 16px; }
  .logo-mark {
    width: 28px; height: 28px; border-radius: 8px;
    background: var(--accent);
    display: grid; place-items: center; color: #07101f;
    box-shadow: 0 4px 14px rgba(59,130,246,0.4);
  }
  iconify-icon { display: inline-block; vertical-align: -0.125em; font-size: 16px; }
  .open-link {
    color: var(--muted); font-size: 12px; text-decoration: none;
    padding: 6px 10px; border-radius: 8px;
    border: 1px solid var(--card-border);
    transition: color .15s, border-color .15s;
  }
  .open-link:hover { color: var(--text); border-color: var(--text); }
  label {
    display: block; font-size: 10px; color: var(--muted);
    margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.08em;
  }
  input, select {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--card-border);
    color: var(--text);
    padding: 9px 10px; border-radius: 8px;
    font-size: 13px; font-family: inherit;
  }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"] { -moz-appearance: textfield; }
  input[type="date"] { color-scheme: dark; }
  input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(0.8);
    cursor: pointer;
  }
  input[type="date"] { cursor: pointer; }
  .field { margin-bottom: 10px; }
  .row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .group-btns { display: flex; flex-direction: column; gap: 8px; }
  .group-btns button {
    width: 100%;
    padding: 16px 20px; font-size: 16px;
    background: rgba(255,255,255,0.04);
    color: var(--text);
    border: 1px solid var(--g-c, var(--card-border));
    border-left: 5px solid var(--g-c, var(--accent));
    border-radius: 12px;
    box-shadow: none;
    font-weight: 700;
    text-transform: capitalize;
    text-align: left;
    letter-spacing: 0.01em;
    transition: background .15s, transform .1s, box-shadow .2s;
  }
  .group-btns button:hover {
    transform: translateX(2px);
    background: color-mix(in srgb, var(--g-c) 18%, transparent);
    box-shadow: 0 4px 16px color-mix(in srgb, var(--g-c) 30%, transparent);
  }
  .group-btns button { --g-c:#60a5fa; }
  .hint {
    background: rgba(59,130,246,0.08);
    border: 1px solid rgba(59,130,246,0.18);
    border-radius: 8px;
    padding: 8px 10px;
    margin-bottom: 10px;
    font-size: 11px; color: var(--muted);
    min-height: 32px;
  }
  .hint b { color: var(--accent); }
  button {
    width: 100%;
    background: var(--accent);
    color: #07101f; border: 0;
    padding: 10px; border-radius: 8px;
    font-weight: 700; font-size: 13px; cursor: pointer;
    transition: background .15s, transform .1s;
    box-shadow: 0 4px 14px rgba(59,130,246,0.3);
  }
  button:hover { background: #60a5fa; transform: translateY(-1px); }
  .recent { margin-top: 12px; }
  .recent h3 {
    font-size: 10px; color: var(--muted); margin: 0 0 6px;
    text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600;
  }
  .session {
    display: flex; justify-content: space-between;
    padding: 6px 8px;
    border: 1px solid var(--card-border);
    border-radius: 6px;
    margin-bottom: 4px;
    background: rgba(0,0,0,0.2);
    font-size: 12px;
  }
  .session .meta { color: var(--muted); font-size: 10px; }
  .session .pr { color: var(--good); font-size: 9px; margin-left: 4px; font-weight: 700; }
  .empty { color: var(--muted); font-size: 11px; text-align: center; padding: 12px; }
  .toast {
    position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
    background: var(--good); color: #07101f;
    padding: 8px 14px; border-radius: 999px;
    font-size: 12px; font-weight: 700;
    opacity: 0; transition: opacity .25s;
    pointer-events: none; z-index: 10;
  }
  .toast.show { opacity: 1; }
  .form-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px;
  }
  .back-btn {
    width: auto !important; padding: 6px 10px !important;
    font-size: 12px !important; font-weight: 600 !important;
    background: transparent !important; color: var(--muted) !important;
    border: 1px solid var(--card-border) !important;
    border-radius: 6px !important; box-shadow: none !important;
  }
  .back-btn:hover { color: var(--text) !important; transform: none !important; }
  .form-title {
    font-weight: 700; font-size: 15px;
    color: var(--accent);
    text-transform: capitalize;
  }
  .ex-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .ex-pills button {
    width: auto;
    padding: 5px 10px; font-size: 11px;
    background: rgba(96,165,250,0.10);
    color: #93c5fd;
    border: 1px solid rgba(96,165,250,0.35);
    border-radius: 999px;
    box-shadow: none; font-weight: 600;
    text-transform: none;
  }
  .ex-pills button:hover { background: rgba(96,165,250,0.22); transform: none; }
  .ex-pills button.active { background: #60a5fa; color: #07101f; border-color: transparent; }
  .streak {
    text-align: center;
    margin: 0 0 14px;
    font-size: 13px;
    color: var(--muted);
  }
  .streak b { color: var(--accent); font-weight: 700; font-size: 15px; }
  .sync-btn {
    width: auto !important; padding: 6px 10px !important;
    font-size: 11px !important; font-weight: 600 !important;
    background: transparent !important; color: var(--muted) !important;
    border: 1px solid var(--card-border) !important;
    border-radius: 8px !important; box-shadow: none !important;
  }
  .sync-btn:hover { color: var(--text) !important; transform: none !important; }
  .sync-btn.on { color: #60a5fa !important; border-color: rgba(96,165,250,0.5) !important; }
  .sync-btn.syncing { opacity: 0.6; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">
      <div class="logo-mark"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M1.5 10h2v4h-2zM4 7.5h3v9H4zM7.5 11h9v2h-9zM17 7.5h3v9h-3zM20.5 10h2v4h-2z"/></svg></div>
      <div>Lift <span style="color:#60a5fa">Log</span></div>
    </div>
    <div style="display:flex; gap:6px; align-items:center;">
      <button type="button" id="sync-btn" class="sync-btn" title="Sync with Google">Sign in</button>
      <a href="#" id="open-full" class="open-link">Open full →</a>
    </div>
  </header>

  <!-- View 1: pick a muscle group -->
  <div id="view-groups">
    <div class="streak" id="home-streak"></div>
    <div class="group-btns" id="group-btns"></div>
  </div>

  <!-- View 2: log set form -->
  <div id="view-form" style="display:none;">
    <div class="form-header">
      <button type="button" class="back-btn" id="back-btn">← Back</button>
      <div class="form-title" id="form-title"></div>
    </div>
    <div class="streak" id="streak"></div>
    <div class="field">
      <label>Exercise</label>
      <input id="exercise" placeholder="New exercise? Type it here..." autocomplete="off"/>
      <div class="ex-pills" id="ex-pills"></div>
    </div>
    <div class="hint" id="hint">Pick an exercise to see your last session.</div>
    <div class="row">
      <div class="field"><label>kg</label>
        <input id="weight" type="number" step="0.5" placeholder="0"/></div>
      <div class="field"><label>Reps</label>
        <input id="reps" type="number" placeholder="0"/></div>
      <div class="field"><label>Sets</label>
        <input id="sets" type="number" placeholder="0"/></div>
    </div>
    <div class="field">
      <label>Date</label>
      <input id="date" type="date"/>
    </div>
    <button id="log-btn">Log Set</button>
  </div>
</div>
<div class="toast" id="toast">Logged ✓</div>

<script src="sync.js"></script>
<script src="popup.js"></script>
</body>
</html>
