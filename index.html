<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lift Log — Progressive Overload Tracker</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='5' fill='%233b82f6'/%3E%3Cpath fill='%2307101f' d='M2.5 10h2v4h-2zM5 7.5h3v9H5zM8.5 11h7v2h-7zM16 7.5h3v9h-3zM19.5 10h2v4h-2z'/%3E%3C/svg%3E"/>
<style>
  /* chart tabs */
.chart-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.chart-tabs {
  display: flex;
  gap: 4px;
}
.chart-tab {
  font-size: 12px;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.12);
  background: transparent;
  color: #8a8a96;
  cursor: pointer;
  transition: all 0.15s;
}
.chart-tab.active {
  background: rgba(59,130,246,0.15);
  color: #60a5fa;
  border-color: rgba(59,130,246,0.3);
}

/* PR badge in history */
.pr-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  background: rgba(34,197,94,0.12);
  color: #22c55e;
  border: 1px solid rgba(34,197,94,0.3);
  border-radius: 4px;
  padding: 1px 5px;
  margin-left: 6px;
  vertical-align: middle;
}

/* volume column in session rows */
.session-vol {
  font-size: 12px;
  color: #8a8a96;
  margin-right: 10px;
  white-space: nowrap;
}
  :root {
    --bg: #07101f;
    --bg-2: #0d1a2e;
    --card: rgba(255, 255, 255, 0.04);
    --card-border: rgba(120, 180, 255, 0.12);
    --text: #e7f0ff;
    --muted: #8ea0bc;
    --accent: #3b82f6;
    --good: #10d9a3;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
    min-height: 100vh;
  }
  .container {
    position: relative; z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px; flex-wrap: wrap; gap: 16px;
  }
  .logo {
    display: flex; align-items: center; gap: 12px;
    font-weight: 800; font-size: 24px; letter-spacing: -0.02em;
    cursor: pointer;
  }
  .logo-mark {
    width: 38px; height: 38px; border-radius: 10px;
    background: #3b82f6;
    display: grid; place-items: center; font-size: 20px; color: #07101f;
    box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4);
  }
  .page-title h1 { font-size: 32px; }
  .streak {
    text-align: center;
    margin: 8px 0 28px;
    font-size: 18px;
    color: var(--muted);
  }
  .streak b { color: #60a5fa; font-weight: 700; font-size: 22px; }
  iconify-icon { display: inline-block; vertical-align: -0.125em; }
  .gradient-text { color: #60a5fa; }
  .stats { display: flex; gap: 24px; color: var(--muted); font-size: 13px; }
  .stats b { color: var(--text); font-size: 18px; display: block; font-weight: 700; }

  /* Nav */
  nav.tabs {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 24px;
    padding: 8px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    backdrop-filter: blur(12px);
  }
  nav.tabs a {
    padding: 10px 16px;
    border-radius: 10px;
    color: var(--muted);
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  nav.tabs a:hover { color: var(--text); background: rgba(255,255,255,0.04); }
  nav.tabs a.active {
    background: var(--tab-c, #3b82f6);
    color: #07101f;
    box-shadow: 0 4px 18px var(--tab-glow, rgba(59,130,246,0.4));
  }

  /* Home grid */
  .group-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }
  .group-card {
    position: relative;
    background: rgba(255,255,255,0.04);
    border: 1px solid #60a5fa;
    border-left: 5px solid #60a5fa;
    border-radius: 12px;
    padding: 20px;
    cursor: pointer;
    transition: transform .15s, background .15s, box-shadow .2s;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .group-card:hover {
    transform: translateX(2px);
    background: color-mix(in srgb, #60a5fa 18%, transparent);
    box-shadow: 0 4px 16px color-mix(in srgb, #60a5fa 30%, transparent);
  }
  .group-name { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
  .group-meta { color: var(--muted); font-size: 12px; }
  .group-meta b { color: var(--text); font-weight: 700; }

  /* Workspace */
  .grid {
    display: grid; grid-template-columns: 1fr 1.3fr; gap: 24px;
  }
  @media (max-width: 880px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 18px;
    padding: 24px;
    backdrop-filter: blur(12px);
  }
  .card h2 {
    margin: 0 0 16px; font-size: 14px;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--muted); font-weight: 600;
  }
  label {
    display: block; font-size: 12px; color: var(--muted);
    margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.08em;
  }
  input, select {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--card-border);
    color: var(--text);
    padding: 12px 14px; border-radius: 10px;
    font-size: 15px; font-family: inherit;
    transition: border 0.15s, background 0.15s;
  }
  input:focus, select:focus {
    outline: none; border-color: var(--accent); background: rgba(0,0,0,0.5);
  }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"] { -moz-appearance: textfield; }
  input[type="date"] { color-scheme: dark; }
  input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(0.8);
    cursor: pointer;
  }
  input[type="date"] { cursor: pointer; }
  .row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .field { margin-bottom: 14px; }

  .ex-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .ex-pills button {
    width: auto;
    padding: 6px 12px; font-size: 12px;
    background: rgba(96,165,250,0.10);
    color: #93c5fd;
    border: 1px solid rgba(96,165,250,0.35);
    border-radius: 999px;
    box-shadow: none; font-weight: 600;
    text-transform: none; letter-spacing: 0;
  }
  .ex-pills button:hover { background: rgba(96,165,250,0.22); transform: none; box-shadow: none; }
  .ex-pills button.active { background: #60a5fa; color: #07101f; border-color: transparent; }
  .last-hint {
    background: rgba(96,165,250,0.08);
    border: 1px solid rgba(96,165,250,0.20);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 14px;
    font-size: 13px; color: var(--muted);
    min-height: 44px;
  }
  .last-hint b { color: #60a5fa; }

  button {
    width: 100%;
    background: #3b82f6;
    color: #07101f; border: 0;
    padding: 14px; border-radius: 12px;
    font-weight: 700; font-size: 15px; cursor: pointer;
    letter-spacing: 0.02em;
    transition: transform 0.1s, box-shadow 0.2s, background 0.2s;
    box-shadow: 0 6px 24px rgba(59, 130, 246, 0.35);
  }
  button:hover { transform: translateY(-1px); background: #60a5fa; box-shadow: 0 10px 30px rgba(59, 130, 246, 0.55); }
  button:active { transform: translateY(0); }
  button.ghost {
    background: transparent; color: var(--muted);
    box-shadow: none; border: 1px solid var(--card-border);
    font-weight: 500;
  }
  button.ghost:hover { color: var(--text); border-color: var(--text); transform: none; }

  .chart-wrap { position: relative; height: 260px; margin-top: 8px; }
  canvas { width: 100% !important; height: 100% !important; }

  .history { margin-top: 20px; max-height: 360px; overflow-y: auto; }
  .session {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 14px; border-radius: 10px;
    border: 1px solid var(--card-border);
    margin-bottom: 8px;
    background: rgba(0,0,0,0.2);
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px);} to {opacity:1; transform:none;} }
  .session .meta { font-size: 12px; color: var(--muted); }
  .session .vals { font-weight: 600; font-variant-numeric: tabular-nums; }
  .session .vals .pr { color: var(--good); font-size: 11px; margin-left: 6px; }
  .session button.del {
    width: auto; background: transparent; color: var(--muted);
    padding: 4px 8px; box-shadow: none; font-size: 14px;
  }
  .session button.del:hover { color: var(--accent); transform: none; box-shadow: none; }

  .empty { color: var(--muted); font-size: 14px; text-align: center; padding: 30px 10px; }
  .toolbar { display: flex; gap: 8px; margin-top: 14px; }
  .toolbar button { flex: 1; }

  .page-title {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 24px;
  }
  .page-title .emoji { font-size: 40px; }
  .page-title h1 { margin: 0; font-size: 28px; letter-spacing: -0.02em; }
  .page-title .sub { color: var(--muted); font-size: 13px; margin-top: 2px; }

  .sync-btn {
    width: auto; padding: 8px 14px;
    background: transparent; color: var(--muted);
    border: 1px solid var(--card-border);
    border-radius: 10px; font-size: 13px; font-weight: 600;
    box-shadow: none; cursor: pointer;
  }
  .sync-btn:hover { color: var(--text); border-color: var(--text); transform: none; box-shadow: none; }
  .sync-btn.on { color: #60a5fa; border-color: rgba(96,165,250,0.5); }
  .sync-btn.syncing { opacity: 0.6; }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo" onclick="location.hash='#/'">
      <div class="logo-mark"><svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M1.5 10h2v4h-2zM4 7.5h3v9H4zM7.5 11h9v2h-9zM17 7.5h3v9h-3zM20.5 10h2v4h-2z"/></svg></div>
      <div>Lift <span class="gradient-text">Log</span></div>
    </div>
    <div style="display:flex; align-items:center; gap:24px;">
      <div class="stats">
        <div><b id="stat-sessions">0</b>sessions</div>
        <div><b id="stat-days">0</b>days training</div>
      </div>
      <button type="button" id="sync-btn" class="sync-btn">Sign in with Google</button>
    </div>
  </header>

  <nav class="tabs" id="tabs"></nav>

  <main id="view"></main>
</div>

<script src="sync.js"></script>
<script src="app.js"></script>
</body>
</html>
